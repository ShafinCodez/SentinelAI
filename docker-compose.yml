version: '3.8'

services:
  api:
    build: .
    container_name: sentinel_api
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  worker_sast:
    build: .
    container_name: sentinel_worker_sast
    env_file: .env
    depends_on:
      - redis
    command: celery -A core.worker worker --queues=sast -l info

  worker_llm:
    build: .
    container_name: sentinel_worker_llm
    env_file: .env
    depends_on:
      - redis
    command: celery -A core.worker worker --queues=llm -l info

  db:
    image: postgres:15
    container_name: sentinel_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: sentinel_secret
      POSTGRES_DB: sentinel_ai
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: sentinel_redis

volumes:
  postgres_data:
